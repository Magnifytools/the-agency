<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Agency</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Login view -->
  <div id="login-view" class="view hidden">
    <div class="header">
      <div class="logo">A</div>
      <h1>The Agency</h1>
    </div>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="login-btn">Conectar</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </div>

  <!-- Main view (after login) -->
  <div id="main-view" class="view hidden">
    <div class="header-bar">
      <div class="header-left">
        <div class="logo-sm">A</div>
        <span class="title">The Agency</span>
        <span id="header-timer" class="header-timer hidden">
          <span class="timer-dot"></span>
          <span id="header-timer-text">0:00</span>
        </span>
      </div>
      <button id="settings-btn" class="icon-btn" title="Cerrar sesion">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab active" data-tab="capture">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Captura
      </button>
      <button class="tab" data-tab="timer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Timer
      </button>
      <button class="tab" data-tab="tasks">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Tareas
      </button>
    </div>

    <!-- ═══ CAPTURE TAB ═══ -->
    <div id="tab-capture" class="tab-content">
      <div class="capture-area">
        <textarea id="note-text" placeholder="Escribe tu nota rapida... (Cmd+Enter para enviar)" rows="4" autofocus></textarea>
        <p id="capture-error" class="error hidden"></p>
        <div class="field-row">
          <input type="url" id="link-url" placeholder="Enlace Drive, Docs... (opcional)" class="field-input">
        </div>
        <div class="field-row">
          <select id="assign-select" class="field-select">
            <option value="">Sin asignar (IA adivinara)</option>
          </select>
        </div>
        <div class="actions">
          <span class="hint">Cmd+Enter</span>
          <button id="capture-btn" class="primary-btn" disabled>
            <span id="btn-text">Capturar</span>
            <span id="btn-loading" class="hidden">Enviando...</span>
          </button>
        </div>
      </div>
      <div id="success-msg" class="success hidden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span id="success-text">Nota capturada</span>
      </div>
      <div id="inbox-bar" class="inbox-bar hidden">
        <span>Inbox: <strong id="inbox-count">0</strong> pendientes</span>
        <a id="open-inbox" href="#" class="link">Abrir inbox</a>
      </div>
    </div>

    <!-- ═══ TIMER TAB ═══ -->
    <div id="tab-timer" class="tab-content hidden">
      <!-- Active timer display -->
      <div id="timer-active" class="timer-section hidden">
        <div class="timer-display">
          <span id="timer-elapsed" class="timer-clock">0:00:00</span>
          <span id="timer-task-name" class="timer-task">Sin tarea</span>
        </div>
        <div class="timer-actions">
          <button id="timer-pause-btn" class="pause-btn">⏸ Pausa</button>
          <button id="timer-resume-btn" class="resume-btn hidden">▶ Reanudar</button>
          <button id="timer-stop-btn" class="stop-btn">Detener</button>
        </div>
      </div>

      <!-- No timer state -->
      <div id="timer-idle" class="timer-section">
        <div class="section-label">Iniciar timer</div>
        <select id="timer-task-select" class="field-select">
          <option value="">Selecciona tarea *</option>
        </select>
        <div id="quick-create-timer" class="quick-create-row">
          <a href="#" id="quick-create-timer-link" class="link small">+ Crear tarea</a>
        </div>
        <div id="quick-create-timer-form" class="quick-create-form hidden">
          <input type="text" id="qc-timer-title" placeholder="Titulo de la tarea *" class="field-input">
          <select id="qc-timer-client" class="field-select">
            <option value="">Cliente *</option>
          </select>
          <div class="quick-create-actions">
            <button id="qc-timer-cancel" class="secondary-btn small">Cancelar</button>
            <button id="qc-timer-save" class="primary-btn small">Crear</button>
          </div>
        </div>
        <button id="timer-start-btn" class="primary-btn full-width" disabled>Iniciar Timer</button>
      </div>

      <!-- Manual time entry -->
      <div class="timer-section">
        <div class="section-label">Registro manual</div>
        <select id="manual-task-select" class="field-select">
          <option value="">Selecciona tarea *</option>
        </select>
        <div id="quick-create-manual" class="quick-create-row">
          <a href="#" id="quick-create-manual-link" class="link small">+ Crear tarea</a>
        </div>
        <div id="quick-create-manual-form" class="quick-create-form hidden">
          <input type="text" id="qc-manual-title" placeholder="Titulo de la tarea *" class="field-input">
          <select id="qc-manual-client" class="field-select">
            <option value="">Cliente *</option>
          </select>
          <div class="quick-create-actions">
            <button id="qc-manual-cancel" class="secondary-btn small">Cancelar</button>
            <button id="qc-manual-save" class="primary-btn small">Crear</button>
          </div>
        </div>
        <div class="time-inputs">
          <div class="time-field">
            <input type="number" id="manual-hours" min="0" max="23" value="0" class="field-input time-input">
            <span class="time-label">h</span>
          </div>
          <div class="time-field">
            <input type="number" id="manual-mins" min="0" max="59" value="0" class="field-input time-input">
            <span class="time-label">m</span>
          </div>
        </div>
        <input type="text" id="manual-notes" placeholder="Notas (opcional)" class="field-input">
        <button id="manual-save-btn" class="secondary-btn full-width">Guardar registro</button>
        <p id="timer-error" class="error hidden"></p>
        <p id="timer-success" class="success-text hidden"></p>
      </div>
    </div>

    <!-- ═══ TASKS TAB ═══ -->
    <div id="tab-tasks" class="tab-content hidden">
      <div class="tasks-header">
        <select id="tasks-filter" class="field-select compact">
          <option value="pending,in_progress,waiting,in_review" selected>Activas</option>
          <option value="in_progress">En curso</option>
          <option value="pending">Pendientes</option>
          <option value="in_review">En revisión</option>
          <option value="waiting">En espera</option>
          <option value="backlog">Backlog</option>
        </select>
        <button id="tasks-refresh" class="icon-btn" title="Refrescar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
      <div id="tasks-list" class="tasks-list">
        <div class="tasks-loading">Cargando tareas...</div>
      </div>
      <div id="tasks-empty" class="tasks-empty hidden">Sin tareas</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
