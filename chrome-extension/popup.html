<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Login view -->
  <div id="login-view" class="view hidden">
    <div class="header">
      <div class="logo">A</div>
      <h1>The Agency</h1>
    </div>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="login-btn">Conectar</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </div>

  <!-- Capture view -->
  <div id="capture-view" class="view hidden">
    <div class="header-bar">
      <div class="header-left">
        <div class="logo-sm">A</div>
        <span class="title">Quick Capture</span>
      </div>
      <button id="settings-btn" class="icon-btn" title="Cerrar sesion">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

    <div class="capture-area">
      <textarea id="note-text" placeholder="Escribe tu nota rapida... (⌘+Enter para enviar)" rows="4" autofocus></textarea>
      <p id="capture-error" class="error hidden"></p>

      <div class="project-row">
        <select id="assign-select">
          <option value="">Sin asignar (IA adivinará)</option>
        </select>
      </div>

      <div class="actions">
        <span class="hint">⌘+Enter</span>
        <button id="capture-btn" class="primary-btn" disabled>
          <span id="btn-text">Capturar</span>
          <span id="btn-loading" class="hidden">Enviando...</span>
        </button>
      </div>
    </div>

    <!-- Success state -->
    <div id="success-msg" class="success hidden">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span id="success-text">Nota capturada — IA clasificando...</span>
    </div>

    <!-- Inbox count -->
    <div id="inbox-bar" class="inbox-bar hidden">
      <span>Inbox: <strong id="inbox-count">0</strong> notas pendientes</span>
      <a id="open-inbox" href="#" class="link">Abrir inbox →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
