<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Login view -->
  <div id="login-view" class="view hidden">
    <div class="header">
      <div class="logo">A</div>
      <h1>Agency Manager</h1>
    </div>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="login-btn">Conectar</button>
      <p id="login-error" class="error hidden"></p>
    </form>
  </div>

  <!-- Capture view -->
  <div id="capture-view" class="view hidden">
    <div class="header-bar">
      <div class="header-left">
        <div class="logo-sm">A</div>
        <span class="title">Quick Capture</span>
      </div>
      <button id="settings-btn" class="icon-btn" title="Configuracion">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>

    <div class="capture-area">
      <textarea id="note-text" placeholder="Escribe tu nota rapida..." rows="4" autofocus></textarea>
      <p id="capture-error" class="error hidden"></p>
      <div class="meta-row">
        <span id="page-info" class="page-info"></span>
      </div>
      <div class="actions">
        <label class="checkbox-label">
          <input type="checkbox" id="include-url" checked>
          <span>Incluir URL</span>
        </label>
        <button id="capture-btn" class="primary-btn" disabled>
          <span id="btn-text">Capturar</span>
          <span id="btn-loading" class="hidden">Enviando...</span>
        </button>
      </div>
    </div>

    <!-- Success state -->
    <div id="success-msg" class="success hidden">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span>Nota capturada — IA clasificando...</span>
    </div>

    <!-- Inbox count -->
    <div id="inbox-bar" class="inbox-bar hidden">
      <span>Inbox: <strong id="inbox-count">0</strong> notas pendientes</span>
      <a id="open-inbox" href="#" class="link">Abrir inbox</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
